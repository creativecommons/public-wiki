# https://docs.docker.com/compose/compose-file/
name: public-wiki

services:

  web:
    container_name: web
    depends_on:
      - db
    build:
      context: .
    links:
      - db
    env_file:
      - .env
    init: true
    ports:
      - '8080:80'
    restart: on-failure
    volumes:
      # MediaWiki volumes
      - volume-wiki-assets:/var/lib/mediawiki/assets
      - volume-wiki-etc:/etc/mediawiki
      - volume-wiki-images:/var/lib/mediawiki/images

  db:
    container_name: db
    # https://hub.docker.com/_/mariadb
    image: mariadb
    env_file:
      - .env
    restart: on-failure
    volumes:
      # Configuration (read-only)
      - ../config/db.cnf:/etc/mysql/conf.d/db.cnf:ro
      # Data
      - volume-mysql:/var/lib/mysql

volumes:
  volume-mysql:
  volume-wiki-assets:
  volume-wiki-etc:
  volume-wiki-images:
