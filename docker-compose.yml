# https://docs.docker.com/compose/compose-file/

services:

  wiki-web:
    container_name: wiki-web
    depends_on:
      - wiki-db
    build:
      args:
        MW_VERSION: ${MW_VERSION}
      context: .
    networks:
      - wiki-backend
    env_file:
      - .env
    init: true
    ports:
      - '8080:80'
    restart: on-failure
    volumes:
      # Apache2 web server configuration
      - ./config/web-sites-available:/etc/apache2/sites-available:ro
      # media wiki images volumes
      - wiki-images-data:/var/www/wiki/images

  wiki-db:
    container_name: wiki-db
    # https://hub.docker.com/_/mariadb
    image: mariadb
    env_file:
      - .env
    networks:
      - wiki-backend
    restart: on-failure
    volumes:
      - wiki-db-data:/var/lib/mysql

volumes:
  wiki-db-data:
    name: wiki-db-data
  wiki-images-data:
    name: wiki-images-data

networks:
  wiki-backend:
    name: wiki-backend
