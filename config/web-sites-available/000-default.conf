# Default VirtualHost for MediaWiki
# File: /etc/apache2/sites-available/000-default.conf

ServerName localhost:8080

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/wiki

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Enable .htaccess overrides for MediaWiki
    <Directory /var/www/wiki>
        AllowOverride All
        Options FollowSymLinks
        Require all granted
    </Directory>

    # Ensure UTF-8 for text files
    AddDefaultCharset UTF-8

    # Enable rewrite engine for MediaWiki's short URLs
    RewriteEngine On
    # Example: rewrite /wiki/Page_Title → /index.php?title=Page_Title
    RewriteRule ^/?wiki(/.*)?$ /index.php?title=$1 [PT,L,QSA]
    # Example: rewrite / → Main_Page
    RewriteRule ^/*$ /index.php [L,QSA]

    # PHP entry point
    DirectoryIndex index.php index.html

    # Security: prevent access to hidden files and version control folders
    <FilesMatch "^(\.git|\.svn|\.DS_Store)">
        Require all denied
    </FilesMatch>

    # Deny access to sensitive files
    <FilesMatch "(LocalSettings\.php|composer\.json|composer\.lock)">
        Require all denied
    </FilesMatch>
</VirtualHost>

