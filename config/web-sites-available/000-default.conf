# Default VirtualHost for MediaWiki
# File: /etc/apache2/sites-available/000-default.conf

ServerName localhost:8080

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/lib/mediawiki
    DirectoryIndex index.php index.html
    AddDefaultCharset UTF-8
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    ## https://www.mediawiki.org/wiki/Manual:Short_URL/Apache

    # Enable the rewrite engine
    RewriteEngine On
    # Short URL for wiki pages
    RewriteRule ^/?wiki(/.*)?$ /index.php [PT,L]
    # Redirect / to Main Page
    RewriteRule ^/*$ /index.php [PT,L]

    <Directory /var/lib/mediawiki>
        # AllowOveride None is faster. Instead of using .htaccess, the settings
        # were copied to Directory stanzas, below.
        AllowOverride None
        Options +FollowSymLinks
    </Directory>

    # Security: restrict directory listing and PHP invocation for uploads
    <Directory /var/lib/mediawiki/images>
        Header set X-Content-Type-Options nosniff
        Options -Indexes
        php_flag engine off
    </Directory>

    # Security: prevent access to cache
    <Directory /var/lib/mediawiki/cache>
        Require all denied
        Satisfy All
    </Directory>

    # Security: prevent access to configuration files
    <FilesMatch "(LocalSettings\.php|composer\.json|composer\.lock)">
        Require all denied
        Satisfy All
    </FilesMatch>

    # Security: prevent access to hidden files and version control folders
    <FilesMatch "^(\.git|\.svn|\.DS_Store)">
        Require all denied
        Satisfy All
    </FilesMatch>
</VirtualHost>

